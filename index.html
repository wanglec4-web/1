<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>英语打字练习 - TypeCraft</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f1a;
  --panel: #1a1a2e;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --correct: #4ade80;
  --wrong: #ef4444;
  --wrong-bg: rgba(239, 68, 68, 0.2);
  --untyped: #64748b;
  --accent: #818cf8;
  --accent-glow: rgba(129, 140, 248, 0.3);
  --cursor: #facc15;
  --border: #2d2d4a;
  --key-bg: #252540;
  --key-highlight: #818cf8;
  --success: #22c55e;
  --radius: 12px;
  --transition: 0.2s ease;
}

body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 20px;
  background-image: 
    radial-gradient(ellipse at 50% 0%, rgba(129,140,248,0.08) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 100%, rgba(74,222,128,0.05) 0%, transparent 50%);
}

.container {
  width: 100%;
  max-width: 780px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* Header */
.header {
  text-align: center;
  padding: 8px 0;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
}

.header .subtitle {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* Controls */
.controls {
  display: flex;
  flex-direction: column;
  gap: 10px;
  align-items: center;
}

.mode-tabs, .diff-tabs {
  display: flex;
  background: var(--panel);
  border-radius: 10px;
  padding: 4px;
  gap: 2px;
  flex-wrap: wrap;
  justify-content: center;
}

.mode-tab, .diff-tab {
  padding: 8px 16px;
  border-radius: 8px;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: var(--transition);
  font-family: inherit;
  white-space: nowrap;
}

.mode-tab:hover, .diff-tab:hover {
  color: var(--text);
}

.mode-tab.active, .diff-tab.active {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.mode-tab.dictation {
  background: rgba(250, 204, 21, 0.1);
}
.mode-tab.dictation.active {
  background: #f59e0b;
  color: #fff;
  box-shadow: 0 2px 12px rgba(245, 158, 11, 0.3);
}

/* Stats Bar */
.stats {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 14px 24px;
  background: var(--panel);
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
}

.stat-icon {
  font-size: 18px;
  opacity: 0.7;
}

.stat-value {
  font-size: 20px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text);
}

.stat-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* Chinese Translation Reference */
.zh-reference {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.zh-reference .zh-label {
  font-size: 12px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.zh-reference .zh-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(245, 158, 11, 0.15);
  color: #fbbf24;
  padding: 6px 12px;
  border-radius: 6px;
  font-size: 15px;
  font-weight: 500;
  border: 1px solid rgba(245, 158, 11, 0.25);
}

.zh-reference .zh-tag .zh-index {
  font-size: 11px;
  color: rgba(251, 191, 36, 0.5);
  font-weight: 400;
}

.zh-reference .zh-tag.current-word {
  background: rgba(250, 204, 21, 0.25);
  border-color: #facc15;
  box-shadow: 0 0 8px rgba(250, 204, 21, 0.2);
}

.zh-reference .zh-tag.done {
  background: rgba(74, 222, 128, 0.12);
  border-color: rgba(74, 222, 128, 0.3);
  color: #4ade80;
}

.zh-reference .zh-tag.wrong-word {
  background: rgba(239, 68, 68, 0.15);
  border-color: rgba(239, 68, 68, 0.3);
  color: #f87171;
}

/* Text Display */
.text-display {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 28px 32px;
  min-height: 140px;
  font-size: 22px;
  line-height: 1.8;
  font-family: 'JetBrains Mono', 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
  letter-spacing: 0.5px;
  position: relative;
  overflow-wrap: break-word;
  word-break: break-word;
}

.text-display.focused {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-glow);
}

.text-char {
  display: inline;
  transition: color 0.1s, background-color 0.08s;
  border-radius: 3px;
  padding: 1px 0;
}

.text-char.untyped { color: var(--untyped); }
.text-char.correct { color: var(--correct); }
.text-char.wrong { 
  color: var(--wrong);
  background: var(--wrong-bg);
}
.text-char.current {
  border-left: 2px solid var(--cursor);
  animation: blink 1s step-end infinite;
  padding-left: 1px;
}

@keyframes blink {
  0%, 100% { border-color: var(--cursor); }
  50% { border-color: transparent; }
}

.text-placeholder {
  color: var(--text-dim);
  font-size: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100%;
  font-family: 'Segoe UI', system-ui, sans-serif;
  letter-spacing: 0;
  text-align: center;
  line-height: 1.6;
}

/* Auto-scroll wrapper */
.text-scroll {
  max-height: 280px;
  overflow-y: auto;
  scroll-behavior: smooth;
  padding-right: 4px;
}

.text-scroll::-webkit-scrollbar { width: 6px; }
.text-scroll::-webkit-scrollbar-track { background: transparent; }
.text-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Hidden input */
.hidden-input {
  position: absolute;
  opacity: 0;
  width: 0;
  height: 0;
  pointer-events: none;
}

/* Focus hint */
.focus-hint {
  text-align: center;
  color: var(--text-dim);
  font-size: 13px;
  margin-top: -8px;
  opacity: 0.7;
  transition: var(--transition);
}

.focus-hint.hidden { opacity: 0; }

/* Reveal toggle for dictation */
.reveal-toggle {
  text-align: center;
  margin-top: -12px;
}

.reveal-btn {
  padding: 6px 16px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--key-bg);
  color: var(--text-dim);
  cursor: pointer;
  font-size: 12px;
  font-family: inherit;
  transition: var(--transition);
}

.reveal-btn:hover {
  color: var(--text);
  border-color: var(--accent);
}

.reveal-btn.revealed {
  background: rgba(74, 222, 128, 0.12);
  border-color: rgba(74, 222, 128, 0.3);
  color: #4ade80;
}

/* Keyboard */
.keyboard {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  align-items: center;
}

.key-row {
  display: flex;
  gap: 4px;
}

.key {
  min-width: 32px;
  height: 36px;
  padding: 0 6px;
  background: var(--key-bg);
  border: 1px solid transparent;
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-dim);
  transition: var(--transition);
  text-transform: uppercase;
  font-family: 'JetBrains Mono', monospace;
}

.key.space {
  min-width: 240px;
  font-size: 11px;
}

.key.highlight {
  background: var(--key-highlight);
  color: #fff;
  border-color: var(--accent);
  box-shadow: 0 0 12px var(--accent-glow);
  transform: translateY(-2px);
}

/* Modal */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 100;
  backdrop-filter: blur(4px);
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 36px 40px;
  text-align: center;
  max-width: 420px;
  width: 90%;
  animation: slideUp 0.3s ease;
}

@keyframes slideUp {
  from { transform: translateY(20px); opacity: 0; }
  to { transform: translateY(0); opacity: 1; }
}

.modal .trophy { font-size: 48px; margin-bottom: 12px; }
.modal h2 { font-size: 24px; margin-bottom: 20px; color: var(--text); }
.modal .result-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 24px;
}

.result-card {
  background: rgba(255,255,255,0.03);
  border-radius: 10px;
  padding: 14px;
}

.result-card .val {
  font-size: 26px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}

.result-card .lbl {
  font-size: 12px;
  color: var(--text-dim);
  margin-top: 4px;
}

.result-card .val.green { color: var(--success); }
.result-card .val.yellow { color: var(--cursor); }
.result-card .val.red { color: var(--wrong); }
.result-card .val.accent { color: var(--accent); }

/* Word review in modal for dictation */
.word-review {
  margin-bottom: 20px;
  text-align: left;
  max-height: 160px;
  overflow-y: auto;
}

.word-review .review-item {
  display: flex;
  gap: 12px;
  padding: 6px 0;
  font-size: 14px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.word-review .review-zh {
  color: var(--text-dim);
  flex-shrink: 0;
  min-width: 60px;
}

.word-review .review-en {
  color: var(--text);
}

.word-review .review-en.wrong {
  color: var(--wrong);
  text-decoration: line-through;
  text-decoration-color: rgba(239,68,68,0.4);
}

.modal .btn-group {
  display: flex;
  gap: 10px;
  justify-content: center;
}

.btn {
  padding: 10px 24px;
  border-radius: 8px;
  border: none;
  cursor: pointer;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  transition: var(--transition);
}

.btn-primary {
  background: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px var(--accent-glow);
}

.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 16px var(--accent-glow); }

.btn-secondary {
  background: var(--key-bg);
  color: var(--text);
  border: 1px solid var(--border);
}

.btn-secondary:hover { border-color: var(--accent); color: #fff; }

/* Responsive */
@media (max-width: 600px) {
  .mode-tab { padding: 8px 12px; font-size: 13px; }
  .stats { gap: 14px; padding: 12px 16px; }
  .stat-value { font-size: 18px; }
  .text-display { font-size: 18px; padding: 20px 18px; }
  .key { min-width: 24px; height: 30px; font-size: 11px; }
  .key.space { min-width: 140px; }
  .modal { padding: 24px 20px; }
  .zh-reference { padding: 12px 16px; }
  .zh-reference .zh-tag { font-size: 14px; padding: 4px 10px; }
}
</style>
</head>
<body>

<div class="container">
  <!-- Header -->
  <div class="header">
    <h1>TypeCraft</h1>
    <div class="subtitle">边打边学，英语打字两不误</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="words">📝 单词</button>
      <button class="mode-tab dictation" data-mode="dictation">🧠 默写</button>
      <button class="mode-tab" data-mode="sentences">📖 短句</button>
      <button class="mode-tab" data-mode="paragraphs">📄 段落</button>
    </div>
    <div class="diff-tabs" id="diffTabs">
      <button class="diff-tab active" data-diff="easy">初级</button>
      <button class="diff-tab" data-diff="medium">中级</button>
      <button class="diff-tab" data-diff="hard">高级</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-item">
      <span class="stat-icon">⏱️</span>
      <div>
        <div class="stat-value" id="timer">0:00</div>
        <div class="stat-label">用时</div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">⚡</span>
      <div>
        <div class="stat-value" id="wpm">0</div>
        <div class="stat-label">WPM</div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">🎯</span>
      <div>
        <div class="stat-value" id="accuracy">100%</div>
        <div class="stat-label">准确率</div>
      </div>
    </div>
    <div class="stat-item">
      <span class="stat-icon">📝</span>
      <div>
        <div class="stat-value" id="progress">0%</div>
        <div class="stat-label">进度</div>
      </div>
    </div>
  </div>

  <!-- Chinese translation reference (dictation mode) -->
  <div class="zh-reference" id="zhReference" style="display:none">
    <span class="zh-label">🇨🇳 中文</span>
    <div id="zhTags"></div>
  </div>

  <!-- Reveal toggle (dictation mode) -->
  <div class="reveal-toggle" id="revealToggle" style="display:none">
    <button class="reveal-btn" id="revealBtn">👁️ 显示英文提示</button>
  </div>

  <!-- Text Display -->
  <div class="text-display" id="textDisplay" tabindex="0">
    <div class="text-scroll" id="textScroll">
      <span class="text-placeholder" id="textPlaceholder">
        点击这里开始<br>选择模式和难度，然后开始你的打字之旅 🚀
      </span>
    </div>
    <input class="hidden-input" id="hiddenInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
  </div>
  <div class="focus-hint" id="focusHint">← 点击上方区域开始打字</div>

  <!-- Keyboard -->
  <div class="keyboard" id="keyboard">
    <div class="key-row">
      <span class="key">q</span><span class="key">w</span><span class="key">e</span><span class="key">r</span><span class="key">t</span><span class="key">y</span><span class="key">u</span><span class="key">i</span><span class="key">o</span><span class="key">p</span>
    </div>
    <div class="key-row">
      <span class="key">a</span><span class="key">s</span><span class="key">d</span><span class="key">f</span><span class="key">g</span><span class="key">h</span><span class="key">j</span><span class="key">k</span><span class="key">l</span>
    </div>
    <div class="key-row">
      <span class="key">z</span><span class="key">x</span><span class="key">c</span><span class="key">v</span><span class="key">b</span><span class="key">n</span><span class="key">m</span>
    </div>
    <div class="key-row">
      <span class="key space">SPACE</span>
    </div>
  </div>
</div>

<!-- Results Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal">
    <div class="trophy" id="trophyEmoji">🏆</div>
    <h2 id="modalTitle">练习完成！</h2>
    <div class="result-grid">
      <div class="result-card"><div class="val yellow" id="resultTime">0:00</div><div class="lbl">用时</div></div>
      <div class="result-card"><div class="val accent" id="resultWPM">0</div><div class="lbl">WPM</div></div>
      <div class="result-card"><div class="val green" id="resultAcc">0%</div><div class="lbl">准确率</div></div>
      <div class="result-card"><div class="val red" id="resultErrors">0</div><div class="lbl">错误数</div></div>
    </div>
    <div class="word-review" id="wordReview" style="display:none"></div>
    <div class="btn-group">
      <button class="btn btn-secondary" id="btnRetry">重试本题</button>
      <button class="btn btn-primary" id="btnNext">换一题</button>
    </div>
  </div>
</div>

// ========== STATE ==========
const state = {
  mode: 'words',
  difficulty: 'easy',
  text: '',
  chars: [],
  cursorPos: 0,
  started: false,
  finished: false,
  startTime: null,
  timerInterval: null,
  elapsed: 0,
  totalKeystrokes: 0,
  errors: 0,
  // Dictation specific
  zhWords: [],         // [{zh, en}] for current dictation round
  revealAnswer: false, // whether to show English answer in dictation
  selectedWords: []    // current round's word objects (for review)
};

// ========== DOM ==========
const els = {
  textDisplay: document.getElementById('textDisplay'),
  textScroll: document.getElementById('textScroll'),
  textPlaceholder: document.getElementById('textPlaceholder'),
  hiddenInput: document.getElementById('hiddenInput'),
  focusHint: document.getElementById('focusHint'),
  timer: document.getElementById('timer'),
  wpm: document.getElementById('wpm'),
  accuracy: document.getElementById('accuracy'),
  progress: document.getElementById('progress'),
  modalOverlay: document.getElementById('modalOverlay'),
  modalTitle: document.getElementById('modalTitle'),
  resultTime: document.getElementById('resultTime'),
  resultWPM: document.getElementById('resultWPM'),
  resultAcc: document.getElementById('resultAcc'),
  resultErrors: document.getElementById('resultErrors'),
  trophyEmoji: document.getElementById('trophyEmoji'),
  zhReference: document.getElementById('zhReference'),
  zhTags: document.getElementById('zhTags'),
  revealToggle: document.getElementById('revealToggle'),
  revealBtn: document.getElementById('revealBtn'),
  wordReview: document.getElementById('wordReview'),
  diffTabs: document.getElementById('diffTabs'),
};

// ========== INIT ==========
function init() {
  // Mode tabs
  document.querySelectorAll('.mode-tab').forEach(btn => {
    btn.addEventListener('click', () => switchMode(btn.dataset.mode));
  });
  // Diff tabs
  document.querySelectorAll('.diff-tab').forEach(btn => {
    btn.addEventListener('click', () => switchDiff(btn.dataset.diff));
  });

  // Click on text display to focus
  els.textDisplay.addEventListener('click', () => {
    els.hiddenInput.focus();
    els.textDisplay.classList.add('focused');
    els.focusHint.classList.add('hidden');
  });

  // Click on keyboard
  document.getElementById('keyboard').addEventListener('click', () => {
    els.hiddenInput.focus();
    els.textDisplay.classList.add('focused');
    els.focusHint.classList.add('hidden');
  });

  // Hidden input events
  els.hiddenInput.addEventListener('keydown', handleKeyDown);
  els.hiddenInput.addEventListener('blur', () => {
    els.textDisplay.classList.remove('focused');
    els.focusHint.classList.remove('hidden');
  });
  els.hiddenInput.addEventListener('focus', () => {
    els.textDisplay.classList.add('focused');
    els.focusHint.classList.add('hidden');
  });

  // Modal buttons
  document.getElementById('btnRetry').addEventListener('click', retry);
  document.getElementById('btnNext').addEventListener('click', () => {
    closeModal();
    generateText();
  });

  // Reveal toggle
  els.revealBtn.addEventListener('click', toggleReveal);

  // ESC to close modal
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && state.finished) {
      closeModal();
      generateText();
    }
  });

  generateText();
}

// ========== MODE & DIFFICULTY ==========
function switchMode(mode) {
  state.mode = mode;
  state.revealAnswer = false;
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  
  // Show/hide difficulty tabs (hidden in sentence/paragraph mode? no, always show)
  // Show/hide dictation-specific UI
  const isDictation = mode === 'dictation';
  els.zhReference.style.display = isDictation ? 'flex' : 'none';
  els.revealToggle.style.display = isDictation ? 'block' : 'none';
  els.revealBtn.textContent = '👁️ 显示当前单词英文';
  els.revealBtn.classList.remove('revealed');
  
  generateText();
}

function switchDiff(diff) {
  state.difficulty = diff;
  document.querySelectorAll('.diff-tab').forEach(b => b.classList.toggle('active', b.dataset.diff === diff));
  generateText();
}

// ========== TEXT GENERATION ==========
function generateText() {
  resetState();
  state.revealAnswer = false;
  els.revealBtn.textContent = '👁️ 显示当前单词英文';
  els.revealBtn.classList.remove('revealed');

  if (state.mode === 'dictation') {
    generateDictation();
  } else if (state.mode === 'words') {
    const pool = data.words[state.difficulty];
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    state.selectedWords = shuffled.slice(0, 10);
    state.text = state.selectedWords.map(w => w.en).join(' ');
    state.zhWords = [];
  } else if (state.mode === 'sentences') {
    const pool = data.sentences[state.difficulty];
    const shuffled = [...pool].sort(() => Math.random() - 0.5);
    state.text = shuffled.slice(0, 5).join(' ');
    state.zhWords = [];
  } else {
    const pool = data.paragraphs[state.difficulty];
    state.text = pool[Math.floor(Math.random() * pool.length)];
    state.zhWords = [];
  }

  // Build chars array
  state.chars = state.text.split('').map(c => ({ char: c, status: 'untyped' }));
  state.cursorPos = 0;
  
  renderText();
  renderZhReference();
  clearKeyboardHighlight();
  updateStats();
  els.hiddenInput.value = '';
  els.hiddenInput.focus();
  els.textDisplay.classList.add('focused');
  els.focusHint.classList.add('hidden');
}

function generateDictation() {
  const pool = data.words[state.difficulty];
  const shuffled = [...pool].sort(() => Math.random() - 0.5);
  state.selectedWords = shuffled.slice(0, 10);
  state.zhWords = state.selectedWords.map(w => w.zh);
  state.text = state.selectedWords.map(w => w.en).join(' ');
}

function resetState() {
  clearInterval(state.timerInterval);
  state.started = false;
  state.finished = false;
  state.startTime = null;
  state.timerInterval = null;
  state.elapsed = 0;
  state.totalKeystrokes = 0;
  state.errors = 0;
  state.cursorPos = 0;
  state.zhWords = [];
  state.selectedWords = [];
  updateStats();
}

function retry() {
  closeModal();
  state.revealAnswer = false;
  els.revealBtn.textContent = '👁️ 显示当前单词英文';
  els.revealBtn.classList.remove('revealed');
  state.chars = state.text.split('').map(c => ({ char: c, status: 'untyped' }));
  state.cursorPos = 0;
  state.started = false;
  state.finished = false;
  state.startTime = null;
  clearInterval(state.timerInterval);
  state.timerInterval = null;
  state.elapsed = 0;
  state.totalKeystrokes = 0;
  state.errors = 0;
  renderText();
  renderZhReference();
  clearKeyboardHighlight();
  updateStats();
  els.hiddenInput.value = '';
  els.hiddenInput.focus();
  els.textDisplay.classList.add('focused');
}

// ========== REVEAL TOGGLE ==========
function toggleReveal() {
  state.revealAnswer = !state.revealAnswer;
  if (state.revealAnswer) {
    els.revealBtn.textContent = '🙈 隐藏当前单词';
    els.revealBtn.classList.add('revealed');
  } else {
    els.revealBtn.textContent = '👁️ 显示当前单词英文';
    els.revealBtn.classList.remove('revealed');
  }
  renderText();
}

// ========== KEY HANDLER ==========
function handleKeyDown(e) {
  if (state.finished) return;

  const ignoreKeys = ['Shift', 'Control', 'Alt', 'Meta', 'CapsLock', 'Tab', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', 'F1', 'F2', 'F3', 'F4', 'F5', 'F6', 'F7', 'F8', 'F9', 'F10', 'F11', 'F12', 'Insert', 'PageUp', 'PageDown', 'Home', 'End'];
  
  if (ignoreKeys.includes(e.key)) return;

  if (!state.started) {
    startTimer();
  }

  if (e.key === 'Backspace') {
    e.preventDefault();
    if (state.cursorPos > 0) {
      state.cursorPos--;
      state.chars[state.cursorPos].status = 'untyped';
    }
    renderText();
    renderZhReference();
    highlightKey('Backspace');
    return;
  }

  if (e.key.length === 1) {
    e.preventDefault();
    state.totalKeystrokes++;
    
    if (state.cursorPos < state.chars.length) {
      const expected = state.chars[state.cursorPos].char;
      if (e.key === expected) {
        state.chars[state.cursorPos].status = 'correct';
      } else {
        state.chars[state.cursorPos].status = 'wrong';
        state.errors++;
      }
      state.cursorPos++;
    }

    renderText();
    renderZhReference();
    highlightKey(e.key);
    updateStats();
    checkCompletion();
  }
}

// ========== TIMER ==========
function startTimer() {
  state.started = true;
  state.startTime = Date.now();
  state.timerInterval = setInterval(() => {
    state.elapsed = Date.now() - state.startTime;
    updateStats();
  }, 200);
}

// ========== STATS ==========
function updateStats() {
  const secs = Math.floor(state.elapsed / 1000);
  const mins = Math.floor(secs / 60);
  const remaining = secs % 60;
  els.timer.textContent = `${mins}:${remaining.toString().padStart(2, '0')}`;

  const typedCorrect = state.chars.filter(c => c.status === 'correct').length;
  const minsFloat = state.elapsed / 60000;
  const wpmVal = minsFloat > 0 ? Math.round((typedCorrect / 5) / minsFloat) : 0;
  els.wpm.textContent = wpmVal;

  const totalTyped = state.chars.filter(c => c.status !== 'untyped').length;
  const accVal = totalTyped > 0 ? Math.round((typedCorrect / totalTyped) * 100) : 100;
  els.accuracy.textContent = `${accVal}%`;

  const progressVal = state.chars.length > 0 ? Math.round((totalTyped / state.chars.length) * 100) : 0;
  els.progress.textContent = `${progressVal}%`;
}

// ========== COMPLETION ==========
function checkCompletion() {
  if (state.cursorPos >= state.chars.length) {
    state.finished = true;
    clearInterval(state.timerInterval);
    
    const typedCorrect = state.chars.filter(c => c.status === 'correct').length;
    const minsFloat = state.elapsed / 60000;
    const finalWPM = minsFloat > 0 ? Math.round((typedCorrect / 5) / minsFloat) : 0;
    const totalTyped = state.chars.filter(c => c.status !== 'untyped').length;
    const finalAcc = totalTyped > 0 ? Math.round((typedCorrect / totalTyped) * 100) : 100;

    const secs = Math.floor(state.elapsed / 1000);
    const mins = Math.floor(secs / 60);
    const rem = secs % 60;
    els.resultTime.textContent = `${mins}:${rem.toString().padStart(2, '0')}`;
    els.resultWPM.textContent = finalWPM;
    els.resultAcc.textContent = `${finalAcc}%`;
    els.resultErrors.textContent = state.errors;
    
    // Trophy
    if (finalAcc >= 98) {
      els.trophyEmoji.textContent = '🏆';
    } else if (finalAcc >= 90) {
      els.trophyEmoji.textContent = '🥇';
    } else if (finalAcc >= 75) {
      els.trophyEmoji.textContent = '🥈';
    } else {
      els.trophyEmoji.textContent = '💪';
    }

    // Modal title
    els.modalTitle.textContent = state.mode === 'dictation' ? '默写完成！' : '练习完成！';

    // Word review for dictation mode
    if (state.mode === 'dictation' && state.selectedWords.length > 0) {
      buildWordReview();
      els.wordReview.style.display = 'block';
    } else {
      els.wordReview.style.display = 'none';
    }

    els.modalOverlay.style.display = 'flex';
    clearKeyboardHighlight();
  }
}

function buildWordReview() {
  // Reconstruct which words were typed correctly by analyzing chars
  const text = state.text; // e.g., "cat dog run"
  const wordStarts = [];
  let pos = 0;
  const words = text.split(' ');
  for (const w of words) {
    wordStarts.push(pos);
    pos += w.length + 1; // +1 for space
  }

  // For each selected word, check if all its chars were correct
  let html = '';
  for (let i = 0; i < state.selectedWords.length; i++) {
    const word = state.selectedWords[i];
    const start = wordStarts[i] || 0;
    const end = start + word.en.length;
    let allCorrect = true;
    for (let j = start; j < end && j < state.chars.length; j++) {
      if (state.chars[j].status !== 'correct') {
        allCorrect = false;
        break;
      }
    }
    html += `<div class="review-item">
      <span class="review-zh">${word.zh}</span>
      <span class="review-en ${allCorrect ? '' : 'wrong'}">${word.en}</span>
    </div>`;
  }
  els.wordReview.innerHTML = html;
}

function closeModal() {
  els.modalOverlay.style.display = 'none';
}

// ========== RENDER ==========
function getWordBoundaries() {
  const text = state.text;
  const boundaries = [];
  let pos = 0;
  const words = text.split(' ');
  for (const w of words) {
    boundaries.push({ start: pos, end: pos + w.length });
    pos += w.length + 1;
  }
  return boundaries;
}

function getCurrentWordIdx(boundaries) {
  for (let i = 0; i < boundaries.length; i++) {
    if (state.cursorPos >= boundaries[i].start && state.cursorPos <= boundaries[i].end) {
      return i;
    }
  }
  return -1;
}

function renderText() {
  els.textPlaceholder.style.display = 'none';
  
  if (state.mode === 'dictation') {
    // In dictation mode: untyped chars shown as dots
    // If revealAnswer is on, only the current word shows English
    const boundaries = getWordBoundaries();
    const currentWordIdx = getCurrentWordIdx(boundaries);
    
    let html = '';
    for (let i = 0; i < state.chars.length; i++) {
      const c = state.chars[i];
      let cls = `text-char ${c.status}`;
      if (i === state.cursorPos) cls += ' current';
      
      // Which word does this char belong to?
      let charWordIdx = -1;
      for (let w = 0; w < boundaries.length; w++) {
        if (i >= boundaries[w].start && i < boundaries[w].end) {
          charWordIdx = w;
          break;
        }
      }
      
      let display;
      if (c.char === ' ') {
        display = '&nbsp;';
      } else if (c.status !== 'untyped') {
        // Already typed (correct or wrong): show actual char
        display = escapeHtml(c.char);
      } else if (state.revealAnswer && charWordIdx === currentWordIdx) {
        // Reveal is on AND this char belongs to the current word: show English
        display = escapeHtml(c.char);
      } else {
        // Hidden: show dot
        display = '·';
      }
      html += `<span class="${cls}">${display}</span>`;
    }
    els.textScroll.innerHTML = html;
  } else {
    // Normal mode: show all characters
    let html = '';
    for (let i = 0; i < state.chars.length; i++) {
      const c = state.chars[i];
      let cls = `text-char ${c.status}`;
      if (i === state.cursorPos) cls += ' current';
      const display = c.char === ' ' ? '&nbsp;' : escapeHtml(c.char);
      html += `<span class="${cls}">${display}</span>`;
    }
    els.textScroll.innerHTML = html;
  }

  // Auto-scroll
  if (state.cursorPos > 0) {
    const cursorEl = els.textScroll.querySelector('.current');
    if (cursorEl) {
      cursorEl.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    }
  }
}

function renderZhReference() {
  if (state.mode !== 'dictation' || state.zhWords.length === 0) return;

  const boundaries = getWordBoundaries();
  let currentWordIdx = getCurrentWordIdx(boundaries);
  // If cursor is past all words, mark last word as current
  const totalChars = state.text.length;
  if (currentWordIdx === -1 && state.cursorPos >= totalChars) {
    currentWordIdx = boundaries.length - 1;
  }

  // Check which words are done (all chars correct)
  let html = '';
  for (let i = 0; i < state.zhWords.length; i++) {
    const zh = state.zhWords[i];
    let cls = 'zh-tag';
    
    if (i < boundaries.length) {
      const wb = boundaries[i];
      let allCorrect = true;
      let anyTyped = false;
      for (let j = wb.start; j < wb.end && j < state.chars.length; j++) {
        if (state.chars[j].status === 'wrong') allCorrect = false;
        if (state.chars[j].status !== 'untyped') anyTyped = true;
        if (state.chars[j].status === 'wrong') allCorrect = false;
      }
      // Check: all chars must be correct, not just some
      let allDone = true;
      for (let j = wb.start; j < wb.end && j < state.chars.length; j++) {
        if (state.chars[j].status !== 'correct') {
          allDone = false;
          break;
        }
      }
      
      if (allDone) {
        cls += ' done';
      } else if (anyTyped) {
        // Check if any wrong in this word
        let hasWrong = false;
        for (let j = wb.start; j < wb.end && j < state.chars.length; j++) {
          if (state.chars[j].status === 'wrong') { hasWrong = true; break; }
        }
        if (hasWrong) cls += ' wrong-word';
      }
    }
    
    if (i === currentWordIdx) {
      cls += ' current-word';
    }
    
    html += `<span class="${cls}"><span class="zh-index">${i+1}.</span>${zh}</span>`;
  }
  els.zhTags.innerHTML = html;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== KEYBOARD HIGHLIGHT ==========
function highlightKey(key) {
  clearKeyboardHighlight();
  
  let target = key.toLowerCase();
  if (key === ' ') target = 'space';
  if (key === 'Backspace') target = 'backspace';
  
  const allKeys = document.querySelectorAll('.key');
  allKeys.forEach(k => {
    const text = k.textContent.trim().toLowerCase();
    if (text === target) {
      k.classList.add('highlight');
    }
  });
}

function clearKeyboardHighlight() {
  document.querySelectorAll('.key.highlight').forEach(k => k.classList.remove('highlight'));
}

// ========== START ==========
init();
</script>
